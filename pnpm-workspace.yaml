# pnpm configuration

# We require a minimum release age of 3-days (specified in minutes) before a 
# package can be used in this project.
# https://pnpm.io/settings#minimumreleaseage
minimumReleaseAge: 4320

packages:
  - packages/*
  - fixtures/*
  - playground

catalog:
  '@types/react': ^19.0.10
  '@types/react-dom': ^19.0.4
  react: ^19.0.0
  react-dom: ^19.0.0

# Force patched versions of transitive dependencies flagged by Dependabot /
# `pnpm audit`. Keys are scoped per major so each line stays within its major
# while picking up the security fix.
overrides:
  '@babel/core@7': ^7.29.6
  '@vitest/browser@4': ^4.1.8
  brace-expansion@2: ^2.0.3
  brace-expansion@5: ^5.0.6
  esbuild@0.27: ^0.28.1
  glob@11: ^11.1.0
  minimatch@5: ^5.1.8
  minimatch@10: ^10.2.3
  picomatch@2: ^2.3.2
  picomatch@4: ^4.0.4
  postcss@8: ^8.5.10
  rollup@4: ^4.59.0
  undici@7: ^7.28.0
  vite@7: ^7.3.5
  ws@8: ^8.21.0

